<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Group Trip Splitter - Fixed Index & Group Logic</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4 md:p-8 text-slate-800">

    <div class="w-full max-w-2xl mx-auto bg-white p-4 sm:p-6 rounded-2xl shadow-xl space-y-6">
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-extrabold text-indigo-600">📊 Trip Splitter Dashboard</h1>
            <div id="syncStatus" class="inline-block px-3 py-1 rounded-full text-xs font-bold bg-slate-100 text-slate-600 border border-slate-200">
                🔄 กำลังเชื่อมต่อฐานข้อมูล...
            </div>
        </div>

        <div class="flex bg-slate-100 p-1 rounded-xl border border-slate-200">
            <button id="tabBtn1" onclick="switchTab(1)" class="flex-1 py-2.5 text-sm font-bold rounded-lg transition-all text-indigo-600 bg-white shadow-sm">
                ✍️ 1. หน้ากรอกค่าใช้จ่าย
            </button>
            <button id="tabBtn2" onclick="switchTab(2)" class="flex-1 py-2.5 text-sm font-bold rounded-lg transition-all text-slate-500 hover:text-slate-800">
                📋 2. แสดงค่าใช้จ่าย & สรุปยอด
            </button>
        </div>
        
        <hr class="border-slate-100">

        <div class="bg-violet-50 p-4 rounded-xl border border-violet-100 space-y-4">
            <h2 class="text-sm font-bold text-violet-950">📂 จัดการกลุ่มทริป</h2>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div>
                    <label class="block text-[11px] font-bold text-violet-500 mb-1">เลือกทริปที่มีอยู่เดิม:</label>
                    <select id="groupDropdown" onchange="handleDropdownChange()" class="w-full p-2.5 border border-violet-200 rounded-lg shadow-sm font-bold text-violet-700 bg-white focus:outline-violet-500 text-sm">
                        <option value="">กำลังโหลดกลุ่ม...</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button onclick="switchGroup()" class="w-full bg-violet-600 text-white p-2.5 rounded-lg font-bold hover:bg-violet-700 transition text-sm active:scale-95 shadow-sm">
                        🔄 เรียกดูข้อมูลกลุ่มนี้
                    </button>
                </div>
            </div>

            <div id="createGroupZone" class="border-t border-violet-100 pt-3">
                <label class="block text-[11px] font-bold text-violet-500 mb-1">ต้องการเปิดทริปใหม่ (พิมพ์ชื่อกลุ่มแล้วกดสร้าง):</label>
                <div class="flex flex-col sm:flex-row gap-2">
                    <input type="text" id="groupNameInput" placeholder="" class="flex-1 p-2.5 border border-violet-200 rounded-lg shadow-sm font-bold text-violet-700 focus:outline-violet-500 text-sm bg-white">
                    <button onclick="createNewGroupClick()" class="bg-emerald-600 text-white px-5 rounded-lg font-bold hover:bg-emerald-700 transition text-sm active:scale-95 shadow-sm">
                        ➕ สร้างกลุ่มใหม่
                    </button>
                </div>
            </div>
        </div>

        <div id="page1" class="space-y-6">
            <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                <label class="block text-sm font-bold text-indigo-950 mb-1">👥 รายชื่อเพื่อนในกลุ่มนี้ (คั่นด้วยเครื่องหมายจุลภาค ,)</label>
                <input type="text" id="friendsInput" value="" oninput="handleFriendsChange()" class="w-full p-2.5 border border-indigo-200 rounded-lg shadow-sm focus:outline-indigo-500 font-medium">
            </div>

            <form id="expenseForm" onsubmit="event.preventDefault(); saveExpense();" class="bg-amber-50 p-4 rounded-xl border border-amber-100 space-y-4">
                <h3 id="formTitle" class="text-sm font-bold text-amber-950">🍔 เพิ่มรายการค่าใช้จ่ายใหม่</h3>
                <input type="hidden" id="editIndex" value="-1">
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">📅 วันที่</label>
                        <input type="date" id="expenseDate" required class="w-full p-2.5 border border-amber-200 rounded-lg focus:outline-indigo-500 bg-white text-sm font-medium">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">🍔 ชื่อรายการ</label>
                        <input type="text" id="expenseDesc" placeholder="เช่น ค่าข้าวเที่ยง" required class="w-full p-2.5 border border-amber-200 rounded-lg focus:outline-indigo-500 bg-white text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">💰 ยอดรวม (บาท)</label>
                        <input type="number" id="expenseAmount" placeholder="ยอดรวมทั้งหมด" required min="0.01" step="any" class="w-full p-2.5 border border-amber-200 rounded-lg focus:outline-indigo-500 bg-white text-sm font-bold text-slate-700">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">👤 ใครออกเงินไปก่อน?</label>
                        <select id="expensePayer" class="w-full p-2.5 border border-amber-200 rounded-lg bg-white focus:outline-indigo-500 text-sm font-medium text-slate-700"></select>
                    </div>
                </div>

                <div class="bg-white p-3 rounded-lg border border-amber-200 space-y-2">
                    <label class="block text-xs font-bold text-slate-700">⚙️ รูปแบบการหารเงิน (Split Option):</label>
                    <select id="splitType" onchange="renderSplitUI()" class="w-full p-2 border border-slate-200 rounded-lg bg-slate-50 focus:outline-indigo-500 text-sm font-medium text-slate-700">
                        <option value="equally">A. หารเท่ากันทุกคน (Equally)</option>
                        <option value="specific">B. เลือกคนหารเฉพาะบางคน (Specific Members)</option>
                        <option value="shares">C. จ่ายไม่เท่ากันเป็นสัดส่วน (By Shares)</option>
                        <option value="exact">D. ระบุเป็นจำนวนเงินของแต่ละคน (By Exact Amount)</option>
                    </select>
                    <div id="splitUIContainer" class="p-2 bg-slate-50 rounded-lg space-y-2 text-sm max-h-48 overflow-y-auto border border-slate-100"></div>
                </div>
                
                <div class="flex gap-2">
                    <button type="submit" id="submitBtn" class="flex-1 bg-amber-500 text-white p-3 rounded-lg font-bold hover:bg-amber-600 transition shadow-md active:scale-[0.99]">
                        ➕ บันทึกรายการลงกลุ่ม
                    </button>
                    <button type="button" id="cancelEditBtn" onclick="cancelEdit()" class="hidden bg-slate-400 text-white p-3 rounded-lg font-bold hover:bg-slate-500 transition shadow-md active:scale-[0.99]">
                        ยกเลิก
                    </button>
                </div>
            </form>
        </div>

        <div id="page2" class="hidden space-y-6">
            <div class="space-y-2">
                <div class="flex justify-between items-center">
                    <h3 class="font-bold text-slate-700 text-sm">📋 ตารางสรุปรายการในกลุ่มนี้:</h3>
                    <button type="button" onclick="clearAllExpenses()" class="text-xs font-bold text-red-500 hover:text-red-700 transition bg-red-50 px-2 py-1 rounded border border-red-200 active:scale-95">
                        🗑️ ล้างรายการทั้งหมดของกลุ่มนี้
                    </button>
                </div>
                
                <div class="w-full overflow-x-auto rounded-xl border border-slate-100">
                    <table class="w-full text-left border-collapse bg-slate-50 text-sm min-w-[600px]">
                        <thead>
                            <tr class="bg-slate-200 text-slate-700 font-bold border-b border-slate-300 text-[12px]">
                                <th class="py-2 px-3 w-24">📅 วันที่</th>
                                <th class="py-2 px-3">🍔 รายการ</th>
                                <th class="py-2 px-3 w-20">👤 คนจ่าย</th>
                                <th class="py-2 px-3 text-right w-24">💰 ยอดเงิน</th>
                                <th class="py-2 px-3 text-center w-24">🛠️ จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="expenseList" class="divide-y divide-slate-100">
                            <tr>
                                <td colspan="5" class="p-6 text-center text-slate-400 bg-white">🔄 กำลังซิงค์ข้อมูล...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="resultSection" class="hidden space-y-4 pt-2">
                <h3 class="font-bold text-xl text-slate-800 border-l-4 border-emerald-500 pl-2">📊 สรุปยอดโอนเงินหักลบกลบหนี้:</h3>
                <div class="bg-indigo-50 p-3.5 rounded-xl text-sm border border-indigo-100 flex justify-between items-center">
                    <span class="text-indigo-950 font-bold">💰 ยอดรวมสะสมของกลุ่มนี้:</span>
                    <span class="text-xl font-black text-indigo-600"><span id="totalTripAmount">0</span> บาท</span>
                </div>
                <div id="transferResult" class="space-y-2 text-sm font-medium text-emerald-900"></div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ ลิงก์เชื่อมโยงไปยัง Google Sheets Apps Script ของคุณ
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVehpGpwzUk_7x0V6mgrLjwDLgCQFInwlesgFEovuTE2GYzEvWDgx7XpD3WEusjaM4/exec"; 

        let expenses = [];
        let allGroups = []; 
        let globalGroupName = ""; // ตัวแปรหลักกลางของระบบสำหรับจำชื่อกลุ่มที่เลือก

        function handleDropdownChange() {
            // ปล่อยว่างไว้ตามดีไซน์ของคุณ
        }

        function switchGroup() {
            const dropdown = document.getElementById('groupDropdown');
            const groupInput = document.getElementById('groupNameInput');
            
            if (dropdown && dropdown.value) {
                globalGroupName = dropdown.value; 
                if (groupInput) groupInput.value = ""; 
                loadExpensesFromSheet();
            } else {
                alert("กรุณาเลือกกลุ่มทริปจากช่อง 'เลือกทริปที่มีอยู่เดิม' ก่อนครับ");
            }
        }

        function createNewGroupClick() {
            const groupInput = document.getElementById('groupNameInput');
            if (!groupInput || groupInput.value.trim() === "") {
                alert("กรุณาพิมพ์ชื่อกลุ่มทริปใหม่ก่อนกดสร้างครับ");
                return;
            }
            
            const newGroup = groupInput.value.trim();
            globalGroupName = newGroup; 
            
            expenses = [];
            renderExpenses();
            document.getElementById('resultSection').classList.add('hidden');
            
            if(!allGroups.includes(newGroup)){
                allGroups.push(newGroup);
            }
            updateGroupDropdown(newGroup);
            
            alert(`🎉 สร้างกลุ่ม "${newGroup}" สำเร็จบนหน้าเว็บแล้ว! เริ่มกรอกข้อมูลรายการแรกได้เลยครับ`);
            switchTab(1);
        }

        function switchTab(tabNum) {
            const btn1 = document.getElementById('tabBtn1');
            const btn2 = document.getElementById('tabBtn2');
            const page1 = document.getElementById('page1');
            const page2 = document.getElementById('page2');

            if (tabNum === 1) {
                page1.classList.remove('hidden'); page2.classList.add('hidden');
                btn1.className = "flex-1 py-2.5 text-sm font-bold rounded-lg transition-all text-indigo-600 bg-white shadow-sm";
                btn2.className = "flex-1 py-2.5 text-sm font-bold rounded-lg transition-all text-slate-500 hover:text-slate-800";
            } else {
                page2.classList.remove('hidden'); page1.classList.add('hidden');
                btn2.className = "flex-1 py-2.5 text-sm font-bold rounded-lg transition-all text-indigo-600 bg-white shadow-sm";
                btn1.className = "flex-1 py-2.5 text-sm font-bold rounded-lg transition-all text-slate-500 hover:text-slate-800";
                calculateFinalSplit();
            }
        }

        // ✨ แก้ไขจุดตาย: ให้ไปดึงจากตัวแปรโกลบอลกลาง หรืออิงตาม dropdown ปัจจุบัน ป้องกันค่าหลุดหาย
        function getGroupName() { 
            if (globalGroupName) return globalGroupName;
            const dropdown = document.getElementById('groupDropdown');
            if (dropdown && dropdown.value) return dropdown.value;
            const groupInput = document.getElementById('groupNameInput');
            return groupInput ? groupInput.value.trim() : "";
        }
        
        function setDefaultDate() { document.getElementById('expenseDate').value = new Date().toISOString().split('T')[0]; }
        function getFriends() { return document.getElementById('friendsInput').value.split(',').map(name => name.trim()).filter(name => name !== ""); }
        function handleFriendsChange() { updatePayerDropdown(); renderSplitUI(); }

        function updatePayerDropdown() {
            const friends = getFriends(); const payerSelect = document.getElementById('expensePayer');
            const currentSelected = payerSelect.value; payerSelect.innerHTML = "";
            friends.forEach(name => { let option = document.createElement('option'); option.value = name; option.text = name; payerSelect.appendChild(option); });
            if (friends.includes(currentSelected)) payerSelect.value = currentSelected;
            else if (friends.length > 0) payerSelect.value = friends[0];
        }

        function renderSplitUI(callback) {
            const friends = getFriends(); const splitType = document.getElementById('splitType').value;
            const container = document.getElementById('splitUIContainer'); container.innerHTML = "";
            if (friends.length === 0) { container.innerHTML = "<span class='text-red-500 font-bold text-xs'>❌ กรุณาพิมพ์รายชื่อเพื่อนก่อนครับ</span>"; return; }
            
            if (splitType === 'equally') container.innerHTML = "<p class='text-slate-400 text-xs py-1'>ทุกคนจ่ายหารเท่ากันหมดในทริปนี้</p>";
            else if (splitType === 'specific') {
                friends.forEach(name => { container.innerHTML += `<label class="flex items-center gap-2 py-1 cursor-pointer select-none"><input type="checkbox" name="splitMember" value="${name}" checked class="w-4 h-4 text-indigo-600 rounded border-slate-300"><span>${name}</span></label>`; });
            } else if (splitType === 'shares') {
                friends.forEach(name => { container.innerHTML += `<div class="flex justify-between items-center py-1"><span>${name}</span><div class="flex items-center gap-1"><input type="number" name="shareValue_${name}" value="1" min="0" class="w-16 p-1 border rounded text-center bg-white font-medium"> ส่วน</div></div>`; });
            } else if (splitType === 'exact') {
                friends.forEach(name => { container.innerHTML += `<div class="flex justify-between items-center py-1"><span>${name}</span><div class="flex items-center gap-1"><input type="number" name="exactValue_${name}" value="0" min="0" step="any" class="w-24 p-1 border rounded text-right bg-white font-bold text-slate-700"> บาท</div></div>`; });
            }
            if(callback) callback();
        }

        function updateGroupDropdown(currentGroup) {
            const dropdown = document.getElementById('groupDropdown');
            dropdown.innerHTML = "";
            
            if (allGroups.length === 0 && currentGroup) {
                allGroups.push(currentGroup);
            }
            
            allGroups.forEach(group => {
                let option = document.createElement('option');
                option.value = group;
                option.text = group;
                if (group === currentGroup) option.selected = true;
                dropdown.appendChild(option);
            });
        }
        
        function renderExpenses() {
            const tbody = document.getElementById('expenseList'); tbody.innerHTML = "";
            if (expenses.length === 0) { 
                tbody.innerHTML = `<tr><td colspan="5" class="p-6 text-center text-slate-400 bg-white">ยังไม่มีข้อมูลใช้จ่ายในกลุ่มนี้ เริ่มกรอกรายการแรกได้เลยครับ</td></tr>`; 
                document.getElementById('resultSection').classList.add('hidden'); 
                return; 
            }
            
            const colorPalette = [
                { bg: 'bg-blue-50', text: 'text-blue-700', border: 'border-blue-200' },
                { bg: 'bg-emerald-50', text: 'text-emerald-700', border: 'border-emerald-200' },
                { bg: 'bg-amber-50', text: 'text-amber-700', border: 'border-amber-200' },
                { bg: 'bg-rose-50', text: 'text-rose-700', border: 'border-rose-200' },
                { bg: 'bg-purple-50', text: 'text-purple-700', border: 'border-purple-200' },
                { bg: 'bg-cyan-50', text: 'text-cyan-700', border: 'border-cyan-200' },
                { bg: 'bg-fuchsia-50', text: 'text-fuchsia-700', border: 'border-fuchsia-200' },
                { bg: 'bg-orange-50', text: 'text-orange-700', border: 'border-orange-200' }
            ];

            expenses.forEach((exp, index) => {
                let displayDate = "-";
                const todayStr = new Date().toLocaleDateString('en-GB'); 
                displayDate = todayStr; 

                if (exp.date) {
                    let dateStr = exp.date.toString().trim();
                    if (dateStr === "" || dateStr === "-" || dateStr === "undefined" || dateStr === "null") {
                        displayDate = todayStr;
                    }
                    else if (dateStr.includes('-') && dateStr.split('-')[0].length === 4) {
                        const parts = dateStr.substring(0, 10).split('-');
                        displayDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
                    } 
                    else if (/[a-zA-Z]/.test(dateStr)) {
                        const match = dateStr.match(/([a-zA-Z]{3})\s(\d{1,2})/);
                        if (match) displayDate = match[0];
                        else displayDate = dateStr;
                    }
                    else {
                        displayDate = dateStr; 
                    }
                }

                let colors = { bg: 'bg-slate-50', text: 'text-slate-700', border: 'border-slate-200' };
                if (exp.payer) {
                    let hash = 0;
                    const nameStr = exp.payer.toString();
                    for (let i = 0; i < nameStr.length; i++) {
                        hash = nameStr.charCodeAt(i) + ((hash << 5) - hash);
                    }
                    const colorIndex = Math.abs(hash) % colorPalette.length;
                    colors = colorPalette[colorIndex];
                }
                
                tbody.innerHTML += `<tr class="bg-white hover:bg-slate-50 transition border-b border-slate-100">
                    <td class="py-1.5 px-3 text-slate-600 font-mono text-[11px] font-bold">${displayDate}</td>
                    <td class="py-1.5 px-3 font-semibold text-slate-700 text-xs sm:text-sm">${exp.desc}</td>
                    <td class="py-1.5 px-3 text-slate-600">
                        <span class="${colors.bg} ${colors.text} ${colors.border} border text-[11px] px-1.5 py-0.5 rounded font-bold inline-block min-w-[65px] text-center">
                            ${exp.payer}
                        </span>
                    </td>
                    <td class="py-1.5 px-3 text-right font-bold text-slate-900 text-xs sm:text-sm">${exp.amount.toFixed(2)} .-</td>
                    <td class="py-1.5 px-3 text-center space-x-0.5 whitespace-nowrap">
                        <button type="button" onclick="startEditExpense(${index})" class="text-indigo-600 font-bold text-[11px] bg-indigo-50 px-1.5 py-0.5 rounded border border-indigo-100 hover:bg-indigo-100 transition active:scale-95">✏️</button>
                        <button type="button" onclick="deleteExpense(${index})" class="text-red-600 font-bold text-[11px] bg-red-50 px-1.5 py-0.5 rounded border border-red-100 hover:bg-red-100 transition active:scale-95">🗑️</button>
                    </td>
                </tr>`;
            });
        }

        function loadExpensesFromSheet() {
            if (!SCRIPT_URL || SCRIPT_URL.trim() === "") {
                setSyncStatus("❌ ยังไม่ได้ใส่ลิงก์ SCRIPT_URL ในโค้ด", "bg-red-50 text-red-600 border-red-200");
                return;
            }

            const dropdown = document.getElementById('groupDropdown');
            const groupInput = document.getElementById('groupNameInput');

            if (dropdown && dropdown.value) {
                globalGroupName = dropdown.value;
            } else if (groupInput && groupInput.value) {
                globalGroupName = groupInput.value.trim();
            }

            setSyncStatus(`🔄 กำลังโหลดข้อมูลกลุ่ม [ ${globalGroupName || "ทริปเริ่มต้น"} ]...`, "bg-amber-50 text-amber-600 border-amber-200");
            
            fetch(`${SCRIPT_URL}?group=${encodeURIComponent(globalGroupName)}`)
                .then(res => res.json())
                .then(data => {
                    expenses = data.expenses || [];
                    if (data.allGroups && data.allGroups.length > 0) {
                        allGroups = data.allGroups;
                        // บังคับให้เซ็ตค่าทริปปัจจุบันในโกลบอล ถ้ายังไม่มีการกำหนด
                        if(!globalGroupName && allGroups.length > 0) globalGroupName = allGroups[0];
                        updateGroupDropdown(globalGroupName);
                    }

                    if (groupInput) {
                        groupInput.value = ""; 
                    }
                    
                    let autoFriends = new Set();
                    expenses.forEach(exp => {
                        if (exp.payer) autoFriends.add(exp.payer);
                        if (exp.splitDetails) {
                            Object.keys(exp.splitDetails).forEach(name => autoFriends.add(name));
                        }
                    });

                    if (autoFriends.size > 0) {
                        document.getElementById('friendsInput').value = Array.from(autoFriends).join(', ');
                    }
                    
                    updatePayerDropdown();
                    renderSplitUI();
                    renderExpenses();
                    calculateFinalSplit();
                    setSyncStatus(`✅ กลุ่ม [ ${globalGroupName} ] ซิงค์สำเร็จ`, "bg-emerald-50 text-emerald-600 border-emerald-200");
                })
                .catch(err => {
                    console.error(err);
                    setSyncStatus("❌ เกิดข้อผิดพลาดในการดึงข้อมูล", "bg-red-50 text-red-600 border-red-200");
                });
        }

        function startEditExpense(index) {
            const exp = expenses[index];
            document.getElementById('editIndex').value = index;
            document.getElementById('expenseDate').value = exp.date ? exp.date.substring(0,10) : "";
            document.getElementById('expenseDesc').value = exp.desc;
            document.getElementById('expenseAmount').value = exp.amount;
            document.getElementById('expensePayer').value = exp.payer;
            document.getElementById('splitType').value = exp.splitType;
            
            document.getElementById('formTitle').innerText = "✏️ แก้ไขรายการ";
            document.getElementById('submitBtn').innerText = "💾 บันทึกการแก้ไข";
            document.getElementById('cancelEditBtn').classList.remove('hidden');

            renderSplitUI(() => {
                if (exp.splitType === 'specific') {
                    document.querySelectorAll('input[name="splitMember"]').forEach(cb => { cb.checked = exp.splitDetails[cb.value] > 0; });
                } else if (exp.splitType === 'shares' || exp.splitType === 'exact') {
                    const prefix = exp.splitType === 'shares' ? 'shareValue_' : 'exactValue_';
                    for(let name in exp.splitDetails) {
                        let inputEl = document.querySelector(`input[name="${prefix}${name}"]`);
                        if(inputEl) inputEl.value = exp.splitDetails[name];
                    }
                }
            });
            switchTab(1);
        }

        function cancelEdit() {
            document.getElementById('editIndex').value = "-1";
            document.getElementById('expenseDesc').value = "";
            document.getElementById('expenseAmount').value = "";
            setDefaultDate();
            document.getElementById('formTitle').innerText = "🍔 เพิ่มรายการค่าใช้จ่ายใหม่";
            document.getElementById('submitBtn').innerText = "➕ บันทึกรายการลงกลุ่ม";
            document.getElementById('cancelEditBtn').classList.add('hidden');
            renderSplitUI();
        }

        function saveExpense() {
            const editIndex = parseInt(document.getElementById('editIndex').value);
            const date = document.getElementById('expenseDate').value;
            const desc = document.getElementById('expenseDesc').value.trim();
            const amount = parseFloat(document.getElementById('expenseAmount').value);
            const payer = document.getElementById('expensePayer').value;
            const splitType = document.getElementById('splitType').value;
            const friends = getFriends();
            
            const currentGroup = getGroupName();
            if (!currentGroup) {
                alert("❌ เกิดข้อผิดพลาด: ไม่พบชื่อกลุ่มในการบันทึกข้อมูล \n(กรุณาเลือกทริปเดิมหรือพิมพ์ชื่อทริปใหม่ก่อนครับ)");
                return;
            }

            let splitDetails = {};

            if (splitType === 'equally') { friends.forEach(name => { splitDetails[name] = amount / friends.length; }); } 
            else if (splitType === 'specific') {
                const checkboxes = document.querySelectorAll('input[name="splitMember"]:checked');
                if (checkboxes.length === 0) { alert("ต้องเลือกเพื่อนอย่างน้อย 1 คนครับ"); return; }
                const subAmount = amount / checkboxes.length;
                friends.forEach(name => { splitDetails[name] = 0; }); checkboxes.forEach(cb => { splitDetails[cb.value] = subAmount; });
            } else if (splitType === 'shares') {
                let totalShares = 0; friends.forEach(name => { totalShares += parseFloat(document.querySelector(`input[name="shareValue_${name}"]`).value) || 0; });
                if (totalShares === 0) { alert("ยอดสัดส่วนรวมต้องมากกว่า 0"); return; }
                friends.forEach(name => { let sh = parseFloat(document.querySelector(`input[name="shareValue_${name}"]`).value) || 0; splitDetails[name] = (sh / totalShares) * amount; });
            } else if (splitType === 'exact') {
                let currentTotal = 0; friends.forEach(name => { let ex = parseFloat(document.querySelector(`input[name="exactValue_${name}"]`).value) || 0; splitDetails[name] = ex; currentTotal += ex; });
                if (Math.abs(currentTotal - amount) > 0.1) { alert("ยอดรวมเงินกรอกไม่ตรงกับยอดเงินสุทธิครับ!"); return; }
            }

            const payload = { action: editIndex > -1 ? "edit" : "insert", index: editIndex, groupName: currentGroup, date, desc, amount, payer, splitType, splitDetails };
            
            setSyncStatus("⏳ กำลังบันทึกข้อมูล...", "bg-amber-50 text-amber-600 border-amber-200");
            fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) })
                .then(() => {
                    cancelEdit();
                    loadExpensesFromSheet();
                    switchTab(2);
                });
        }

        function deleteExpense(index) {
            const currentGroup = getGroupName();
            const itemToDelete = expenses[index]; 
            
            if (!currentGroup) {
                alert("❌ ไม่พบชื่อกลุ่มสำหรับการลบรายการ");
                return;
            }
            
            if (confirm(`คุณต้องการลบรายการ "${itemToDelete.desc}" ใช่หรือไม่?`)) {
                setSyncStatus("⏳ กำลังลบรายการ...", "bg-red-50 text-red-600 border-red-200");
                
                const payload = {
                    action: "delete",
                    groupName: currentGroup,
                    index: index
                };

                fetch(SCRIPT_URL, { 
                    method: "POST", 
                    body: JSON.stringify(payload) 
                })
                .then(res => res.json())
                .then(() => { 
                    setSyncStatus("✅ ลบรายการสำเร็จ", "bg-green-50 text-green-600 border-green-200");
                    loadExpensesFromSheet(); 
                })
                .catch(err => {
                    console.error("Delete error:", err);
                    setSyncStatus("❌ ลบไม่สำเร็จ กรุณาลองใหม่", "bg-red-50 text-red-600 border-red-200");
                });
            }
        }

        function clearAllExpenses() {
            const currentGroup = getGroupName();
            if (!currentGroup) {
                alert("❌ ไม่พบชื่อกลุ่มสำหรับการล้างรายการ");
                return;
            }
            if (confirm(`⚠️ คุณต้องการล้างรายการทั้งหมดของกลุ่ม "${currentGroup}" ใช่หรือไม่?\n(ข้อมูลในกลุ่มนี้จะถูกลบถาวร)`)) {
                setSyncStatus("⏳ กำลังล้างข้อมูลกลุ่ม...", "bg-red-50 text-red-600 border-red-200");
                
                const payload = {
                    action: "clear",
                    groupName: currentGroup
                };

                fetch(SCRIPT_URL, { 
                    method: "POST", 
                    body: JSON.stringify(payload) 
                })
                .then(res => res.json())
                .then(() => { 
                    setSyncStatus("✅ ล้างข้อมูลกลุ่มสำเร็จ", "bg-green-50 text-green-600 border-green-200");
                    loadExpensesFromSheet(); 
                })
                .catch(err => {
                    console.error("Clear error:", err);
                    setSyncStatus("❌ ล้างข้อมูลไม่สำเร็จ กรุณาลองใหม่", "bg-red-50 text-red-600 border-red-200");
                });
            }
        }

        function calculateFinalSplit() {
            const friends = getFriends(); if (friends.length === 0 || expenses.length === 0) return;
            let totalTripAmount = 0; let balances = {}; friends.forEach(name => { balances[name] = 0; });
            
            expenses.forEach(exp => {
                totalTripAmount += exp.amount; if (balances[exp.payer] !== undefined) balances[exp.payer] += exp.amount;
                friends.forEach(name => { if (exp.splitDetails[name] !== undefined) balances[name] -= exp.splitDetails[name]; });
            });
            
            document.getElementById('totalTripAmount').innerText = totalTripAmount.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            let debtors = [], creditors = [];
            for (let name in balances) {
                if (balances[name] < -0.01) debtors.push({ name, amount: Math.abs(balances[name]) });
                else if (balances[name] > 0.01) creditors.push({ name, amount: balances[name] });
            }
            
            let transferOutput = ""; let d = 0, c = 0; let itemIndex = 0;
            while (d < debtors.length && c < creditors.length) {
                let debtor = debtors[d], creditor = creditors[c]; let amountToTransfer = Math.min(debtor.amount, creditor.amount);
                transferOutput += `
                <div id="transferItem_${itemIndex}" class="bg-emerald-50 p-3.5 rounded-xl border border-emerald-200 flex justify-between items-center shadow-sm transition-all duration-300">
                    <div class="flex items-center gap-3">
                        <input type="checkbox" onchange="togglePaidStatus(${itemIndex})" class="w-5 h-5 text-emerald-600 rounded border-emerald-300 cursor-pointer">
                        <div id="transferText_${itemIndex}" class="text-slate-800">
                            💸 <span class="font-bold">${debtor.name}</span> ต้องโอนให้ <span class="font-bold">${creditor.name}</span>
                        </div>
                    </div>
                    <div id="transferAmount_${itemIndex}" class="text-sm sm:text-base font-black text-emerald-700">${amountToTransfer.toFixed(2)} บาท</div>
                </div>`;
                debtor.amount -= amountToTransfer; creditor.amount -= amountToTransfer;
                if (debtor.amount <= 0.1) d++; if (creditor.amount <= 0.1) c++; itemIndex++;
            }
            document.getElementById('transferResult').innerHTML = transferOutput || '<div class="text-center py-4 text-slate-500 bg-slate-50 rounded-xl border border-dashed border-slate-200 font-bold">🎉 เคลียร์ยอดลงตัวพอดี ไม่ต้องโอนเงินครับ!</div>';
            document.getElementById('resultSection').classList.remove('hidden');
        }

        // โหลดข้อมูลอัตโนมัติเมื่อเปิดหน้าเว็บครั้งแรก
        window.onload = function() {
            setDefaultDate();
            loadExpensesFromSheet();
        };
    </script>
</body>
</html>
